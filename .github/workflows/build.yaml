name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows

          - os: macos-latest
            artifact: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --clean --noconfirm --windowed --name MyShare main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyShare-${{ matrix.artifact }}
          path: dist/